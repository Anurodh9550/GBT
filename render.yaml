# Render Free Plan + Neon — GBT Backend
# https://render.com/docs/free

services:
  - type: web
    name: gbt-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn gbt_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: gbt-api.onrender.com
      - key: FRONTEND_URL
        value: https://gbt-two.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://gbt-two.vercel.app,http://localhost:3000
